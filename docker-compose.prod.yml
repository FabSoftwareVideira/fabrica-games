services:
  web:
    image: busybox:latest
    container_name: fabrica-games
    # ports:
    #   - "4321:80"
    volumes:
      - ./src:/var/www/html
    command: >
      /bin/sh -c "
      busybox httpd -f -p 80 -h /var/www/html
      "
    restart: always
    networks:
      - fabrica-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  fabrica-network:
    external: true